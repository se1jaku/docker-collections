name: realmp-egress
services:
  realmp-egress:
    image: ghcr.io/se1jaku/realmp:latest
    hostname: realmp-egress
    container_name: realmp-egress
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ${REALMP_CONFIG_DIR:-/etc/realmp}:/etc/realm
    command: -c /etc/realm/egress.toml

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: ${REALMP_MEM_LIMIT:-128}mb
